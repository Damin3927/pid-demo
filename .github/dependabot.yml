version: 2
updates:
  # Application dependencies (package.json + pnpm-lock.yaml).
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      # Bundle low-risk updates into a single PR; majors stay separate.
      npm-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions used by the Pages deploy workflow.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns:
          - "*"
